<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCC</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            background: #0f172a;
            color: white;
        }

        .card {
            background: #1e293b;
            border-radius: 16px;
            padding: 20px;
        }
    </style>
</head>

<body>

    <div class="max-w-7xl mx-auto p-6">

        <div class="flex flex-col lg:flex-row lg:justify-between lg:items-center mb-8">

    <div>
        <h1 class="text-5xl font-bold mb-2">
           MCC
        </h1>

        <p class="text-slate-400">
            Plataforma Inteligente de Qualidade Ambiental Interna
        </p>
    </div>

    <div id="deviceInfo"
         class="card mt-4 lg:mt-0 min-w-[280px]">
    </div>

</div>
        <!-- CARDS -->
        <div id="cards"
            class="grid-cols-1 md:grid-cols-3 lg:grid-cols-3 gap-4 mb-8">
        </div>
        <div id="scoreCard"
     class="card mb-8 text-center">
        </div>
        
        <!-- STATUS -->
        <div id="statusCard"
            class="card mb-8">
        </div>

        <!-- ALERTAS -->
        <div id="alertsCard"
            class="card mb-8">
        </div>

        <!-- MITIGAÇÕES -->
        <div id="mitigationCard"
            class="card">
        </div>

    </div>

    <script src="analysis.js"></script>
    <script src="script.js"></script>

</body>
</html>
