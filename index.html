<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clim Care</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            background: #0f172a;
            color: white;
        }

        .card {
            background: #1e293b;
            border-radius: 16px;
            padding: 20px;
        }
    </style>
</head>

<body>

    <div class="max-w-7xl mx-auto p-6">

        <h1 class="text-4xl font-bold mb-2">
            Clim Care
        </h1>

        <p class="text-slate-400 mb-8">
            Monitoramento Inteligente da Qualidade Ambiental
        </p>

        <!-- CARDS -->
        <div id="cards"
            class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        </div>
        <div id="scoreCard"
     class="card mb-8 text-center">
        </div>
        
        <!-- STATUS -->
        <div id="statusCard"
            class="card mb-8">
        </div>

        <!-- ALERTAS -->
        <div id="alertsCard"
            class="card mb-8">
        </div>

        <!-- MITIGAÇÕES -->
        <div id="mitigationCard"
            class="card">
        </div>

    </div>

    <script src="analysis.js"></script>
    <script src="script.js"></script>

</body>
</html>
