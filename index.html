<!DOCTYPE html>
<html lang="pt-BR">
<head>
   <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel QAI - Qualidade do Ar Interno</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .card { transition: all 0.3s ease; }
        .card:hover { transform: translateY(-4px); }
        .alert { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.85; } }
    </style>
</head>
<body class="bg-gray-950 text-white">
    <div class="max-w-7xl mx-auto p-6">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-bold flex items-center gap-3">
                    <i class="fas fa-air-freshener text-emerald-400"></i>
                    Painel QAI Hospitalar
                </h1>
                <p class="text-gray-400">Qualidade do Ar Interno • Tempo Real</p>
            </div>
            <div class="flex items-center gap-4">
                <div id="device-status" class="flex items-center gap-2 bg-gray-900 px-4 py-2 rounded-xl">
                    <div class="w-3 h-3 bg-emerald-400 rounded-full animate-pulse"></div>
                    <span class="text-sm">Online</span>
                </div>
                <button onclick="sendTelegramAlert()" 
                        class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-xl flex items-center gap-2 font-medium">
                    <i class="fas fa-paper-plane"></i>
                    Enviar Alerta Telegram
                </button>
            </div>
        </header>

        <!-- Cards de Medições -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-8" id="measurements">
            <!-- Populated by JS -->
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Alertas e Diagnósticos -->
            <div class="lg:col-span-2 bg-gray-900 rounded-3xl p-6">
                <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3">
                    <i class="fas fa-exclamation-triangle text-amber-400"></i>
                    Alertas e Anomalias Detectadas
                </h2>
                <div id="alerts-container" class="space-y-4">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Previsões / Resumo -->
            <div class="bg-gray-900 rounded-3xl p-6">
                <h2 class="text-2xl font-semibold mb-6">Resumo &amp; Recomendações</h2>
                <div id="summary" class="space-y-6">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>

        <!-- Gráfico -->
        <div class="mt-8 bg-gray-900 rounded-3xl p-6">
            <div class="flex justify-between mb-6">
                <h2 class="text-2xl font-semibold">Evolução Recente (Últimas 24h)</h2>
                <select id="chart-period" onchange="updateChart()" class="bg-gray-800 text-white rounded-xl px-4 py-2">
                    <option value="24h">Últimas 24 horas</option>
                    <option value="7d">Últimos 7 dias</option>
                </select>
            </div>
            <canvas id="evolutionChart" class="w-full" height="120"></canvas>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
